services:
  - type: web
    name: airos-research-agent
    runtime: python
    buildCommand: pip install -r requirements.txt && playwright install chromium && playwright install-deps
    startCommand: python app.py
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false
      - key: LLM_MODEL
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 8000
